<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arjen Apokalypsi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-screen" class="screen">
        <h1>Arjen Apokalypsi</h1>
        <p>Mitä haluat kysyä kohtalolta?</p>
        <input type="text" id="user-question" placeholder="Esim. Miksi heräsin tänään?">
        <button onclick="startShuffle()">LÄHETÄ KYSYMYS</button>
    </div>

    <div id="table-screen" class="screen" style="display:none">
        <p id="instruction">Valitse kortti, joka kantaa vastaustasi...</p>
        <div id="deck-container"></div>
    </div>

    <div id="result-overlay" style="display:none">
        <div class="modal-content">
            <p id="display-question"></p>
            <div id="selected-card-visual"></div>
            <h2 id="card-name"></h2>
            <p id="card-text"></p>
            <p id="card-extra"></p>
            <button onclick="location.reload()">OTA UUSI KOHTALO</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
